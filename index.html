<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel='stylesheet' href="style.css">
</head>
<body>
    <div class="container">
        <div class="result"></div>
        <div class="operands">
            <div class="numbers">
                <div class="top">
                    <div class="box"><h1>9</h1></div>
                    <div class="box"><h1>8</h1></div>
                    <div class="box"><h1>7</h1></div>
                </div>
                <div class="middle">
                    <div class="box"><h1>6</h1></div>
                    <div class="box"><h1>5</h1></div>
                    <div class="box"><h1>4</h1></div>
                </div>
                <div class="bottom">
                    <div class="box"><h1>3</h1></div>
                    <div class="box"><h1>2</h1></div>
                    <div class="box"><h1>1</h1></div>
                </div>
                <div class="box-sec"><h1>0</h1></div>
            </div>
            <div class="arithmetic">
                <div class="boz-ac"><h1>AC</h1></div>
                <div class="boz"><h1>/</h1></div>
                <div class="boz"><h1>*</h1></div>
                <div class="boz"><h1>-</h1></div>
                <div class="boz"><h1>+</h1></div>
                <div class="boz-equal"><h1>=</h1></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
